services:
  watcher:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    volumes:
      - ./src:/home/node/app/src
      - ./nodemon.json:/home/node/app/nodemon.json
      - aircraft_db:/home/node/app/data
    container_name: watcher-in-the-sky
    command: npm run dev
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Denver
      - AIRCRAFT_INFO_DB=/home/node/app/data/aircraft_info.db

volumes:
  aircraft_db:
